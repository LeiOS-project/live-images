set default=0

if [ x"${feature_menuentry_id}" = xy ]; then
  menuentry_id_option="--id"
else
  menuentry_id_option=""
fi

export menuentry_id_option

if [ "${prev_saved_entry}" ]; then
  set saved_entry="${prev_saved_entry}"
  save_env saved_entry
  set prev_saved_entry=
  save_env prev_saved_entry
  set boot_once=true
fi

function savedefault {
  if [ -z "${boot_once}" ]; then
    saved_entry="${chosen}"
    save_env saved_entry
  fi
}
function load_video {
  if [ x$feature_all_video_module = xy ]; then
    insmod all_video
  else
    insmod efi_gop
    insmod efi_uga
    insmod ieee1275_fb
    insmod vbe
    insmod vga
    insmod video_bochs
    insmod video_cirrus
  fi
}

font="/boot/grub/live-theme/unicode.pf2"

if loadfont $font ; then
  set gfxmode=1920x1080,auto
  load_video
  insmod gfxterm
  set locale_dir=/boot/grub/locale
  set lang=de_DE
  insmod gettext
fi

terminal_output gfxterm
insmod gfxmenu
loadfont /boot/grub/live-theme/terminus-12.pf2
loadfont /boot/grub/live-theme/terminus-14.pf2
loadfont /boot/grub/live-theme/terminus-16.pf2
loadfont /boot/grub/live-theme/terminus-18.pf2
loadfont /boot/grub/live-theme/unifont-16.pf2
loadfont /boot/grub/live-theme/unifont-24.pf2
loadfont /boot/grub/live-theme/unifont-32.pf2
insmod jpeg
insmod png
set theme=/boot/grub/live-theme/theme.txt
export theme
if [ "${recordfail}" = 1 ] ; then
  set timeout=30
else
  if [ x$feature_timeout_style = xy ] ; then
    set timeout_style=menu
    set timeout=5
  # Fallback normal timeout code in case the timeout_style feature is
  # unavailable.
  else
    set timeout=5
  fi
fi


terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Live boot
LINUX_LIVE

# You can add more entries like this
# menuentry "Alternate live boot" {
# linux KERNEL_LIVE APPEND_LIVE custom options here
# initrd INITRD_LIVE
# }
# menuentry "Alternate graphical installer" {
# linux KERNEL_GI APPEND_GI custom options here
# initrd INITRD_GI
# }
# menuentry "Alternate textual installer" {
# linux KERNEL_DI APPEND_DI custom options here
# initrd INITRD_DI
# }
menuentry "Live system (German)" {
linux KERNEL_LIVE APPEND_LIVE locales=de_DE.UTF-8
initrd INITRD_LIVE
}



# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

}